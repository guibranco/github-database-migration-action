name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  
  test-action:
    name: GitHub Actions Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: testdb
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Create migrations directory and sample migration
        run: |
          mkdir -p migrations
          echo "CREATE TABLE IF NOT EXISTS test_table (id INT PRIMARY KEY);" > migrations/001_create_test_table.sql

      - name: Test Local Action (dry-run)
        id: test-action-dry-run
        uses: ./
        with:
          driver: 'mysql'
          host: 'mysql'
          user: 'testuser'
          database: 'testdb'
          operation: 'dry-run'
        env:
          DATABASE_PWD: testpassword

      - name: Test Local Action (migrate)
        id: test-action-migrate
        uses: ./
        with:
          driver: 'mysql'
          host: 'mysql'
          user: 'testuser'
          database: 'testdb'
          operation: 'migrate'
        env:
          DATABASE_PWD: testpassword

      - name: Test Local Action (check)
        id: test-action-check
        uses: ./
        with:
          driver: 'mysql'
          host: 'mysql'
          user: 'testuser'
          database: 'testdb'
          operation: 'check'
        env:
          DATABASE_PWD: testpassword

      - name: Print Output
        id: output
        run: echo "${{ steps.test-action-check.outputs.time }}"

  create-release:
    name: Create release
    needs: test-action
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0

      - name: Create Release (tag)
        uses: ncipollo/release-action@v1.21.0
        with:
          allowUpdates: false
          skipIfReleaseExists: true
          draft: false
          makeLatest: false
          tag: v${{ steps.gitversion.outputs.semVer }}
          name: Release v${{ steps.gitversion.outputs.semVer }}
          generateReleaseNotes: true
          body:
            Release ${{ steps.gitversion.outputs.semVer }} of ${{ github.event.repository.name }}

      - name: Create Release (latest)
        uses: ncipollo/release-action@v1.21.0
        with:
          allowUpdates: true
          skipIfReleaseExists: false
          draft: false
          makeLatest: true
          tag: latest
          name: Release v${{ steps.gitversion.outputs.semVer }}
          generateReleaseNotes: true
          body:
            Release ${{ steps.gitversion.outputs.semVer }} of ${{ github.event.repository.name }}
